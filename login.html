<!DOCTYPE html>
<html>
<head>
  <title>FMCT Burger Login</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #ffe9b3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .burger {
      width: 350px;
      text-align: center;
    }

    .bun-top {
      background: #f7c56f;
      height: 70px;
      border-radius: 50px 50px 20px 20px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }

    .tomato {
      background: #ff6b6b;
      color: white;
      border-radius: 20px;
      padding: 12px;
      font-size: 18px;
      margin: 10px 0;
      width: 100%;
      border: none;
    }

    .cheese {
      background: #ffd84d;
      border-radius: 15px;
      padding: 12px;
      font-size: 18px;
      margin: 10px 0;
      width: 100%;
      border: none;
    }

    .login-btn {
      background: #ff4d4d;
      color: white;
      padding: 14px;
      width: 90%;
      border-radius: 20px;
      border: none;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin: 15px auto;
      display: block;
      transition: 0.2s;
    }

    .login-btn:hover {
      background: #ff7373;
      transform: scale(1.05);
    }

    .bun-bottom {
      background: #f7c56f;
      height: 60px;
      border-radius: 20px 20px 50px 50px;
      margin-top: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
      color: #5a2e00;
    }
  </style>
</head>

<body>

  <div class="burger">

    <div class="bun-top"></div>

    <input class="tomato" id="email" type="email" placeholder="Email (tomato)">
    <input class="cheese" id="password" type="password" placeholder="Password (cheese)">

    <button class="login-btn" onclick="login()">🍅 Login 🍅</button>

    <p id="status"></p>

    <div class="bun-bottom"></div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
const firebaseConfig = {
  apiKey: "AIzaSyAZVkqvd1HJaAFA9JjUsk3HuYahO7-m_qc",
  authDomain: "fmct-58e22.firebaseapp.com",
  projectId: "fmct-58e22",
  storageBucket: "fmct-58e22.firebasestorage.app",
  messagingSenderId: "479095036843",
  appId: "1:479095036843:web:e800df57bb2b01f5f4d0ee"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const status = document.getElementById("status");

      status.innerHTML = "⏳ Toasting your login...";

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          status.innerHTML = "🍔 Logged in! Redirecting...";
          setTimeout(() => window.location.href = "index.html", 1000);
        })
        .catch(err => status.innerHTML = "❌ " + err.message);
    }
  </script>

</body>
</html>
