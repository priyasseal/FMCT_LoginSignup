<!DOCTYPE html>
<html>
<head>
  <title>FMCT Burger Sign Up</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #ffe9b3;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .burger {
      width: 380px;
      text-align: center;
    }

    .layer {
      width: 100%;
      padding: 18px;
      margin: -5px 0;
      border-radius: 25px;
      font-size: 18px;
      border: none;
      outline: none;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .bun-top {
      background: #f7c56f;
      height: 70px;
      border-radius: 50px 50px 20px 20px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }

    .lettuce {
      background: #9be27c;
      border-radius: 20px;
      padding: 12px;
      font-weight: bold;
      color: #2d4f1e;
    }

    .tomato {
      background: #ff6b6b;
      color: white;
      border-radius: 20px;
      padding: 12px;
      font-weight: bold;
    }

    .cheese {
      background: #ffd84d;
      border-radius: 15px;
      padding: 12px;
      font-weight: bold;
      color: #5a2e00;
    }

    .patty {
      background: #8b4513;
      color: #ffe9b3;
      border-radius: 20px;
      padding: 12px;
      font-weight: bold;
    }

    .bun-bottom {
      background: #f7c56f;
      height: 60px;
      border-radius: 20px 20px 50px 50px;
      margin-top: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    .signup-btn {
      background: #ff4d4d;
      color: white;
      padding: 14px;
      width: 90%;
      border-radius: 20px;
      border: none;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin: 15px auto;
      display: block;
      transition: 0.2s;
    }

    .signup-btn:hover {
      background: #ff7373;
      transform: scale(1.05);
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
      color: #ffe9b3;
    }
  </style>
</head>

<body>

  <div class="burger">

    <div class="bun-top"></div>

    <input class="layer lettuce" type="text" id="firstName" placeholder="First Name (lettuce)">
    <input class="layer lettuce" type="text" id="lastName" placeholder="Last Name (lettuce)">
    <input class="layer tomato" type="email" id="email" placeholder="Email (tomato)">
    <input class="layer cheese" type="password" id="password" placeholder="Password (cheese)">

    <button class="signup-btn" id="signupBtn">🍅 Sign Up 🍅</button>

    <div class="patty" id="status">Status Patty</div>

    <div class="bun-bottom"></div>

  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
   const firebaseConfig = {
  apiKey: "AIzaSyAZVkqvd1HJaAFA9JjUsk3HuYahO7-m_qc",
  authDomain: "fmct-58e22.firebaseapp.com",
  projectId: "fmct-58e22",
  storageBucket: "fmct-58e22.firebasestorage.app",
  messagingSenderId: "479095036843",
  appId: "1:479095036843:web:e800df57bb2b01f5f4d0ee"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.getElementById("signupBtn").onclick = async function() {
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const status = document.getElementById("status");

      if (firstName.length < 2) return status.innerHTML = "❌ First name too short!";
      if (lastName.length < 2) return status.innerHTML = "❌ Last name too short!";
      if (!email.includes("@") || !email.includes(".")) return status.innerHTML = "❌ Invalid email!";
      if (password.length < 8 || password.length > 20) return status.innerHTML = "❌ Password must be 8–20 chars!";

      status.innerHTML = "⏳ Cooking your account...";

      try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await db.collection("users").doc(user.uid).set({
          firstName,
          lastName,
          email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        status.innerHTML = "🍔 Account ready! Redirecting...";
        setTimeout(() => window.location.href = "index.html", 1000);

      } catch (error) {
        status.innerHTML = "❌ " + error.message;
      }
    };
  </script>

</body>
</html>
