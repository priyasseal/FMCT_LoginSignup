<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body { font-family: Arial; text-align: center; background: #ffe9b3; padding: 40px; }
        input { padding: 10px; width: 250px; margin: 10px; border-radius: 8px; border: 2px solid #ff9900; }
        button { padding: 12px 20px; background: #ffcc33; border: 2px solid #ff9900; border-radius: 12px; font-weight: bold; }
    </style>
</head>

<body>

<h2>Create Account</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password" type="password">
<button onclick="signup()">Sign Up</button>

<p><a href="login.html">Already have an account?</a></p>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZVkqvd1HJaAFA9JjUsk3HuYahO7-m_qc",
  authDomain: "fmct-58e22.firebaseapp.com",
  projectId: "fmct-58e22",
  storageBucket: "fmct-58e22.firebasestorage.app",
  messagingSenderId: "479095036843",
  appId: "1:479095036843:web:e800df57bb2b01f5f4d0ee"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function signup() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
        .then(() => {
            alert("Account created!");
            window.location.href = "login.html";
        })
        .catch(err => alert(err.message));
}
</script>

</body>
</html>
