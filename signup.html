<!DOCTYPE html>
<html>
<head>
  <title>FMCT Sign Up</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe9b3;
      padding: 40px;
    }
    h1 {
      color: #5a2e00;
    }
    input {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 250px;
      border: 2px solid #ff9900;
      border-radius: 10px;
      font-size: 16px;
    }
    button {
      display: block;
      margin: 20px auto;
      padding: 14px;
      width: 250px;
      background-color: #ffcc33;
      color: #5a2e00;
      font-weight: bold;
      border-radius: 12px;
      border: 2px solid #ff9900;
      font-size: 18px;
      cursor: pointer;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
      color: #5a2e00;
    }
  </style>
</head>

<body>
  <h1>Create Your FMCT Account</h1>

  <!-- ⭐ NEW FIELDS -->
  <input type="text" id="firstName" placeholder="First Name">
  <input type="text" id="lastName" placeholder="Last Name">

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password (8–20 chars)">
  <button id="signupBtn">Sign Up</button>

  <p id="status"></p>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
   const firebaseConfig = {
  apiKey: "AIzaSyAZVkqvd1HJaAFA9JjUsk3HuYahO7-m_qc",
  authDomain: "fmct-58e22.firebaseapp.com",
  projectId: "fmct-58e22",
  storageBucket: "fmct-58e22.firebasestorage.app",
  messagingSenderId: "479095036843",
  appId: "1:479095036843:web:e800df57bb2b01f5f4d0ee"
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.getElementById("signupBtn").onclick = async function() {
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const status = document.getElementById("status");

      // ⭐ VALIDATION RULES
      if (firstName.length < 2) {
        status.innerHTML = "❌ First name must be at least 2 characters.";
        return;
      }

      if (lastName.length < 2) {
        status.innerHTML = "❌ Last name must be at least 2 characters.";
        return;
      }

      if (!email.includes("@") || !email.includes(".")) {
        status.innerHTML = "❌ Enter a valid email address.";
        return;
      }

      if (password.length < 8 || password.length > 20) {
        status.innerHTML = "❌ Password must be 8–20 characters.";
        return;
      }

      status.innerHTML = "⏳ Creating account...";

      try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // ⭐ SAVE FULL NAME IN FIRESTORE
        await db.collection("users").doc(user.uid).set({
          firstName: firstName,
          lastName: lastName,
          email: email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        status.innerHTML = "✅ Signup successful! Redirecting...";
        setTimeout(() => window.location.href = "index.html", 1000);

      } catch (error) {
        status.innerHTML = "❌ " + error.message;
      }
    };
  </script>
</body>
</html>
