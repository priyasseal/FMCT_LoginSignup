<!DOCTYPE html>
<html>
<head>
  <title>FMCT Burger Home</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #fcecc0;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .burger {
      width: 380px;
      text-align: center;
      transform: scale(1.05);
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
      position: relative;
      z-index: 1;
    }

    /* --- BUNS --- */
    .bun-top {
      background: linear-gradient(to bottom, #f9d27a, #e8b85c);
      height: 130px;
      border-radius: 200px 200px 60px 60px;
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .bun-bottom {
      background: linear-gradient(to top, #f9d27a, #e8b85c);
      height: 110px;
      border-radius: 60px 60px 200px 200px;
      box-shadow: inset 0 10px 0 rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    /* --- LAYERS --- */
    .layer {
      width: 100%;
      min-height: 60px;
      padding: 15px 0;
      margin: 18px 0;
      border-radius: 40px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .lettuce {
      background: repeating-linear-gradient(
        45deg,
        #9be27c,
        #9be27c 10px,
        #8bd66b 10px,
        #8bd66b 20px
      );
    }

    .patty {
      background: repeating-linear-gradient(
        45deg,
        #7a3f1a,
        #7a3f1a 8px,
        #5a2e00 8px,
        #5a2e00 16px
      );
      border-radius: 30px;
      height: 65px;
      margin: 20px 0;
      color: #ffe9b3;
      font-weight: bold;
      font-size: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- BUTTONS (REAL LINKS) --- */
    .tomato-btn, .cheese-btn {
      display: block;
      width: 90%;
      padding: 14px;
      margin: 18px auto;
      border-radius: 20px;
      border: none;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
      position: relative;
      z-index: 3;
    }

    .tomato-btn {
      background: radial-gradient(circle at 30% 30%, #ff7b7b, #ff4d4d);
      color: white;
    }

    .cheese-btn {
      background: linear-gradient(to right, #ffd84d, #ffcc33);
      color: #5a2e00;
    }

    .tomato-btn:hover,
    .cheese-btn:hover {
      transform: scale(1.05);
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      color: #5a2e00;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="burger">

    <div class="bun-top"></div>

    <div class="layer lettuce">
      <div id="welcomeText">Welcome!</div>
    </div>

    <div class="layer lettuce">
      <div id="userStatus">Checking login status...</div>
    </div>

    <!-- ✅ REAL LINKS THAT ALWAYS WORK -->
    <a class="tomato-btn" id="loginBtn" href="./login.html">Login</a>
    <a class="cheese-btn" id="signupBtn" href="./signup.html">Sign Up</a>

    <!-- Logout stays a button -->
    <button class="tomato-btn" id="logoutBtn" style="display:none;">Logout</button>

    <div class="patty"></div>
    <div class="bun-bottom"></div>
  </div>

  <p id="status"></p>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
   const firebaseConfig = {
  apiKey: "AIzaSyAZVkqvd1HJaAFA9JjUsk3HuYahO7-m_qc",
  authDomain: "fmct-58e22.firebaseapp.com",
  projectId: "fmct-58e22",
  storageBucket: "fmct-58e22.firebasestorage.app",
  messagingSenderId: "479095036843",
  appId: "1:479095036843:web:e800df57bb2b01f5f4d0ee"
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async user => {
      const welcomeText = document.getElementById("welcomeText");
      const userStatus = document.getElementById("userStatus");
      const loginBtn = document.getElementById("loginBtn");
      const signupBtn = document.getElementById("signupBtn");
      const logoutBtn = document.getElementById("logoutBtn");

      if (user) {
        const doc = await db.collection("users").doc(user.uid).get();
        const data = doc.data();
        const fullName = `${data.firstName} ${data.lastName}`;

        welcomeText.innerHTML = `🍔 Welcome, ${fullName}!`;
        userStatus.innerHTML = `Logged in as: ${data.email}`;

        loginBtn.style.display = "none";
        signupBtn.style.display = "none";
        logoutBtn.style.display = "block";
      } else {
        welcomeText.innerHTML = "Welcome!";
        userStatus.innerHTML = "You are not logged in.";

        loginBtn.style.display = "block";
        signupBtn.style.display = "block";
        logoutBtn.style.display = "none";
      }
    });

    document.getElementById("logoutBtn").onclick = function() {
      auth.signOut();
    };
  </script>
</body>
</html>
