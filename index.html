<!DOCTYPE html>
<html>
<head>
  <title>FMCT Burger Home</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #fcecc0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .burger {
      width: 400px;
      text-align: center;
    }

    .bun-top, .bun-bottom {
      background: linear-gradient(to bottom, #f9d27a, #e8b85c);
      height: 80px;
      border-radius: 50px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      margin: 10px 0;
    }

    .patty {
      background: #7a3f1a;
      color: #ffe9b3;
      border-radius: 20px;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      margin: 10px 0;
    }

    .tomato-btn, .cheese-btn {
      display: block;
      width: 90%;
      padding: 14px;
      margin: 10px auto;
      border-radius: 20px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .tomato-btn {
      background: #ff6b6b;
      color: white;
    }

    .cheese-btn {
      background: #ffd84d;
      color: #5a2e00;
    }

    .tomato-btn:hover, .cheese-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="burger">
    <div class="bun-top"></div>

    <div class="patty" id="welcomeText">Welcome!</div>
    <div class="patty" id="userStatus">Checking login status...</div>

    <button class="tomato-btn" id="loginBtn">Login</button>
    <button class="cheese-btn" id="signupBtn">Sign Up</button>
    <button class="tomato-btn" id="logoutBtn" style="display:none;">Logout</button>

    <div class="bun-bottom"></div>
  </div>

  <!-- ✅ Make sure your code is inside <script> tags -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
     const firebaseConfig = {
  apiKey: "AIzaSyAZVkqvd1HJaAFA9JjUsk3HuYahO7-m_qc",
  authDomain: "fmct-58e22.firebaseapp.com",
  projectId: "fmct-58e22",
  storageBucket: "fmct-58e22.firebasestorage.app",
  messagingSenderId: "479095036843",
  appId: "1:479095036843:web:e800df57bb2b01f5f4d0ee"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async user => {
      const welcomeText = document.getElementById("welcomeText");
      const userStatus = document.getElementById("userStatus");
      const loginBtn = document.getElementById("loginBtn");
      const signupBtn = document.getElementById("signupBtn");
      const logoutBtn = document.getElementById("logoutBtn");

      if (user) {
        const doc = await db.collection("users").doc(user.uid).get();
        const data = doc.data();
        const fullName = `${data.firstName} ${data.lastName}`;
        welcomeText.innerHTML = `🍔 Welcome, ${fullName}!`;
        userStatus.innerHTML = `Logged in as: ${data.email}`;
        loginBtn.style.display = "none";
        signupBtn.style.display = "none";
        logoutBtn.style.display = "block";
      } else {
        welcomeText.innerHTML = "Welcome!";
        userStatus.innerHTML = "You are not logged in.";
        loginBtn.style.display = "block";
        signupBtn.style.display = "block";
        logoutBtn.style.display = "none";
      }
    });

    document.getElementById("logoutBtn").onclick = function() {
      auth.signOut();
    };
  </script>
</body>
</html>
